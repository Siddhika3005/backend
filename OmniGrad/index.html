<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniGrad - Student Management System</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="app">
    <!-- Background Elements -->
    <div class="app__background">
        <div class="app__background-gradient"></div>
    </div>

    <!-- Main Container -->
    <div class="app__container">
        <!-- Header -->
        <header class="header">
            <div class="header__content">
                <div class="header__title-group">
                    <h1 class="header__title">🎓 OmniGrad</h1>
                    <p class="header__subtitle">Modern Student Management System</p>
                </div>
                <div class="header__stats">
                    <div class="stat stat--students">
                        <span class="stat__value" id="totalStudents">0</span>
                        <span class="stat__label">Students</span>
                    </div>
                    <div class="stat stat--courses">
                        <span class="stat__value" id="uniqueCourses">0</span>
                        <span class="stat__label">Courses</span>
                    </div>
                    <div class="stat stat--activity">
                        <span class="stat__value" id="recentActivity">—</span>
                        <span class="stat__label">Recent</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Form Section -->
        <section class="form-section">
            <div class="form-card">
                <div class="form-card__header">
                    <h2 class="form-card__title">Add New Student</h2>
                    <p class="form-card__description">Enter student details below</p>
                </div>

                <form class="form" onsubmit="event.preventDefault(); addStudent();">
                    <div class="form__group">
                        <label class="form__label" for="name">Full Name</label>
                        <input 
                            class="form__input" 
                            id="name" 
                            type="text"
                            placeholder="e.g., Alex Johnson" 
                            required
                        />
                        <span class="form__error" id="nameError"></span>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="course">Course</label>
                        <input 
                            class="form__input" 
                            id="course" 
                            type="text"
                            placeholder="e.g., Computer Science" 
                            required
                        />
                        <span class="form__error" id="courseError"></span>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email Address</label>
                        <input 
                            class="form__input" 
                            id="email" 
                            type="email"
                            placeholder="e.g., alex@example.com" 
                            required
                        />
                        <span class="form__error" id="emailError"></span>
                    </div>

                    <button class="button button--primary form__submit" type="submit">
                        <span class="button__text">Add Student</span>
                        <span class="button__icon">+</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Search & Filter Section -->
        <section class="search-section">
            <div class="search-box">
                <input 
                    class="search-box__input" 
                    id="searchInput" 
                    type="text"
                    placeholder="Search by name or course..."
                    oninput="handleSearch()"
                />
                <span class="search-box__icon">🔍</span>
            </div>
            <div class="search-results" id="searchResults"></div>
        </section>

        <!-- Students Grid Section -->
        <section class="students-section">
            <div class="students-section__header">
                <h2 class="students-section__title">Student Directory</h2>
            </div>

            <div id="students" class="students-grid"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-state__icon">👤</div>
                <h3 class="empty-state__title">No Students Yet</h3>
                <p class="empty-state__message">Add your first student to get started</p>
            </div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal__overlay" onclick="closeEditModal()"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2 class="modal__title">Edit Student</h2>
                <button class="modal__close" onclick="closeEditModal()">×</button>
            </div>

            <form class="form" onsubmit="event.preventDefault(); saveEditedStudent();">
                <div class="form__group">
                    <label class="form__label" for="editName">Full Name</label>
                    <input 
                        class="form__input" 
                        id="editName" 
                        type="text"
                        placeholder="Full Name" 
                        required
                    />
                    <span class="form__error" id="editNameError"></span>
                </div>

                <div class="form__group">
                    <label class="form__label" for="editCourse">Course</label>
                    <input 
                        class="form__input" 
                        id="editCourse" 
                        type="text"
                        placeholder="Course" 
                        required
                    />
                    <span class="form__error" id="editCourseError"></span>
                </div>

                <div class="form__group">
                    <label class="form__label" for="editEmail">Email Address</label>
                    <input 
                        class="form__input" 
                        id="editEmail" 
                        type="email"
                        placeholder="Email" 
                        required
                    />
                    <span class="form__error" id="editEmailError"></span>
                </div>

                <div class="modal__actions">
                    <button class="button button--secondary" type="button" onclick="closeEditModal()">
                        Cancel
                    </button>
                    <button class="button button--primary" type="submit">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
