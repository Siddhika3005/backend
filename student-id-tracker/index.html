<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="app">
    <!-- Background Elements -->
    <div class="app__background">
        <div class="app__background-gradient"></div>
    </div>

    <!-- Main Container -->
    <div class="app__container">
        <!-- Header -->
        <header class="header">
            <div class="header__content">
                <div class="header__title-group">
                    <h1 class="header__title">Student ID Tracker</h1>
                    <p class="header__subtitle">Manage and organize student information efficiently</p>
                </div>
                <div class="header__badge">
                    <span class="badge badge--accent" id="studentCount">0 students</span>
                </div>
            </div>
        </header>

        <!-- Form Section -->
        <section class="form-section">
            <div class="form-card">
                <div class="form-card__header">
                    <h2 class="form-card__title">Add New Student</h2>
                    <p class="form-card__description">Enter student details below</p>
                </div>

                <form class="form" onsubmit="event.preventDefault(); addStudent();">
                    <div class="form__group">
                        <label class="form__label" for="name">Full Name</label>
                        <input 
                            class="form__input" 
                            id="name" 
                            type="text"
                            placeholder="e.g., Alex Johnson" 
                            required
                        />
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="course">Course</label>
                        <input 
                            class="form__input" 
                            id="course" 
                            type="text"
                            placeholder="e.g., Computer Science" 
                            required
                        />
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email Address</label>
                        <input 
                            class="form__input" 
                            id="email" 
                            type="email"
                            placeholder="e.g., alex@example.com" 
                            required
                        />
                    </div>

                    <button class="button button--primary form__submit" type="submit">
                        <span class="button__text">Add Student</span>
                        <span class="button__icon">+</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Students Grid Section -->
        <section class="students-section">
            <div class="students-section__header">
                <h2 class="students-section__title">Student Directory</h2>
            </div>

            <div id="students" class="students-grid"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-state__icon">👤</div>
                <h3 class="empty-state__title">No Students Yet</h3>
                <p class="empty-state__message">Add your first student to get started</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
